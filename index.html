<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />

  <!-- Lås zoom -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mors telefon" />

  <!-- Android / PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />

  <title>Mors telefon</title>

  <link rel="apple-touch-icon" sizes="180x180" href="telefon.png" />
  <link rel="apple-touch-icon" href="telefon.png" />
  <link rel="icon" href="telefon.png" />

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.75);
      --stroke:rgba(255,255,255,.12);
      --radius:22px;
      --shadow:0 10px 26px rgba(0,0,0,.35);
      --gap:14px;
      --max:980px;

      --openBg:rgba(0,255,170,.15);
      --openBorder:rgba(0,255,170,.35);
      --openDot:rgba(0,255,170,1);

      --closedBg:rgba(255,90,90,.12);
      --closedBorder:rgba(255,90,90,.28);
      --closedDot:rgba(255,90,90,1);

      --okGreen:#27d17c;
      --okGreen2:#1fb66c;
    }

    *{box-sizing:border-box}

    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{
      background:
        radial-gradient(1200px 800px at 50% 0%, rgba(80,140,255,.22), transparent 55%),
        radial-gradient(900px 600px at 10% 90%, rgba(0,255,170,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .app{
      height:100dvh;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding:calc(10px + env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));
    }

    .wrap{
      width:100%;
      max-width:var(--max);
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
    }

    .header{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding:10px 10px 0;
    }

    .topIcon{
      width:min(140px,46vw);
      aspect-ratio:1;
      border-radius:28px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:grid;
      place-items:center;
    }

    .topIcon img{
      width:82%;
      height:82%;
      object-fit:contain;
    }

    h1{
      margin:0;
      font-size:clamp(20px,5.2vw,28px);
      line-height:1.05;
    }

    .hint{
      margin:0;
      color:var(--muted);
      font-size:clamp(14px,3.8vw,16px);
      text-align:center;
    }

    .grid{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:var(--gap);
      padding:8px 4px 0;
    }

    .card{
      text-decoration:none;
      color:inherit;
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
      display:grid;
      grid-template-rows:1fr auto;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      cursor:pointer;
      min-height:0;
    }

    .card:active{transform:scale(.985)}

    .avatar{
      width:min(150px,34vw);
      aspect-ratio:1;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--stroke);
      display:grid;
      place-items:center;
      margin:auto;
      overflow:hidden;
    }

    .avatar svg{
      width:100%;
      height:100%;
      display:block;
    }

    .meta{ text-align:center; }

    .name{
      margin:6px 0 2px;
      font-size:clamp(16px,4.2vw,20px);
      font-weight:900;
      line-height:1.05;
    }

    .phone{
      margin:0;
      font-size:clamp(12px,3.4vw,14px);
      color:rgba(255,255,255,.8);
      line-height:1.15;
    }

    .callTag{
      margin:10px auto 0;
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:9px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:clamp(13px,3.6vw,15px);
      border:1px solid transparent;
      background:rgba(255,255,255,.08);
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.7);
    }

    .callTag.open{ background:var(--openBg); border-color:var(--openBorder); }
    .callTag.open .dot{ background:var(--openDot); }
    .callTag.closed{ background:var(--closedBg); border-color:var(--closedBorder); }
    .callTag.closed .dot{ background:var(--closedDot); }

    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modalBackdrop.show{ display:flex; }

    .modal{
      width:min(520px, 92vw);
      background:#0b1220;
      border:1px solid rgba(255,255,255,.14);
      border-radius:20px;
      box-shadow:0 18px 50px rgba(0,0,0,.55);
      padding:16px 16px 14px;
      text-align:center;
    }

    .modal h2{
      margin:6px 0 10px;
      font-size:20px;
    }

    .modal p{
      margin:0 0 12px;
      color:rgba(255,255,255,.82);
      font-size:17px;
      line-height:1.35;
    }

    .btnRow{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:10px;
    }

    .okBtn{
      appearance:none;
      border:0;
      padding:12px 18px;
      border-radius:14px;
      font-weight:900;
      font-size:18px;
      color:#062012;
      background:linear-gradient(180deg, var(--okGreen), var(--okGreen2));
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      cursor:pointer;
      min-width:140px;
    }

    .okBtn:active{ transform:scale(.98); }

    @media (max-height: 720px){
      .topIcon{ width:min(120px,44vw); border-radius:24px; }
      .grid{ gap:12px; padding-top:6px; }
      .avatar{ width:min(140px,32vw); }
      .callTag{ margin-top:8px; padding:8px 11px; }
    }
  </style>
</head>

<body>

<!-- Modal -->
<div class="modalBackdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 id="modalTitle">Lukket</h2>
    <p id="modalText">Kan ikke ringes til i dette tidsrum</p>
    <div class="btnRow">
      <button class="okBtn" id="okBtn" type="button">OK</button>
    </div>
  </div>
</div>

<audio id="blockedAudio" preload="auto" src="spærring.mp3"></audio>

<script>
  // Stop “pinch to zoom” (så godt som muligt i iOS)
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());

  // Stop dobbelt-tap zoom
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive:false });

  const modal = document.getElementById('modal');
  const okBtn = document.getElementById('okBtn');
  const audioEl = document.getElementById('blockedAudio');
  let autoCloseTimer = null;

  function parseHHMM(s){
    const [h,m] = s.split(':').map(Number);
    return (h*60 + m);
  }

  function minutesNow(){
    const d = new Date();
    return d.getHours()*60 + d.getMinutes();
  }

  function isInBlockedWindow(nowMin, startStr, endStr){
    const start = parseHHMM(startStr);
    const end = parseHHMM(endStr);

    if (start === end) return true;
    if (start < end){
      return nowMin >= start && nowMin < end;
    } else {
      return (nowMin >= start) || (nowMin < end);
    }
  }

  function setTagState(card, blocked){
    const tag = card.querySelector('.callTag');
    const tagText = card.querySelector('.tagText');

    tag.classList.toggle('open', !blocked);
    tag.classList.toggle('closed', blocked);
    tagText.textContent = blocked ? 'LUKKET' : 'RING';
  }

  function updateAllStates(){
    const now = minutesNow();
    document.querySelectorAll('.card').forEach(card=>{
      const bs = card.getAttribute('data-block-start');
      const be = card.getAttribute('data-block-end');
      const blocked = isInBlockedWindow(now, bs, be);
      card.dataset.blocked = blocked ? '1' : '0';
      setTagState(card, blocked);
    });
  }

  function closeModal(){
    modal.classList.remove('show');
    try{
      audioEl.pause();
      audioEl.currentTime = 0;
    }catch(e){}
    if (autoCloseTimer){
      clearTimeout(autoCloseTimer);
      autoCloseTimer = null;
    }
  }

  async function showBlockedPrompt(){
    modal.classList.add('show');
    try{
      audioEl.currentTime = 0;
      await audioEl.play();
      audioEl.onended = () => closeModal();
    }catch(e){
      autoCloseTimer = setTimeout(closeModal, 2500);
    }
  }

  okBtn.addEventListener('click', closeModal);

  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', async (e)=>{
      e.preventDefault();
      const tel = card.getAttribute('data-tel');
      const blocked = card.dataset.blocked === '1';

      if (blocked){
        await showBlockedPrompt();
        return;
      }

      window.location.href = 'tel:' + tel;
    });
  });

  updateAllStates();
  setInterval(updateAllStates, 15000);
</script>

<!-- Service Worker til Android / PWA -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('Service worker registreret'))
        .catch(err => console.log('Service worker fejl:', err));
    });
  }
</script>
